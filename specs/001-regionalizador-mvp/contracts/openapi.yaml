openapi: 3.1.0
info:
  title: Regionalizador API
  version: 0.1.0
  description: API para regionalização de participantes com KMeans
servers:
  - url: http://localhost:8000
    description: Dev
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  app: { type: string }
  /jobs:
    post:
      summary: Cria job de regionalização
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [shapefile, schools, participants, city_name, n_regions]
              properties:
                shapefile:
                  type: string
                  format: binary
                  description: ZIP contendo .shp, .dbf, .shx, .prj
                schools:
                  type: string
                  format: binary
                  description: XLSX ou CSV de escolas
                participants:
                  type: string
                  format: binary
                  description: XLSX ou CSV de participantes
                city_name:
                  type: string
                  description: Nome do município (case-insensitive)
                n_regions:
                  type: integer
                  minimum: 1
                  maximum: 50
                max_radius_km:
                  type: number
                  nullable: true
                  description: Raio máximo por região em km
                capacity_factor:
                  type: number
                  minimum: 1.0
                  maximum: 2.0
                  default: 1.2
                target_crs:
                  type: string
                  default: EPSG:31983
      responses:
        "200":
          description: Job criado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobStatus" }
        "422":
          description: Erro de validação
  /jobs/{job_id}:
    get:
      summary: Consulta status de um job
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Status atual
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobStatus" }
        "404":
          description: Job não encontrado
  /jobs/{job_id}/files/{name}:
    get:
      summary: Download de artefato
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string }
        - name: name
          in: path
          required: true
          schema:
            type: string
            enum:
              - regionalizacao_participantes.xlsx
              - regionalizacao_escolas.xlsx
              - regionalizacao_regioes.xlsx
              - regioes.kml
      responses:
        "200":
          description: Arquivo
          content:
            application/octet-stream: {}
        "404":
          description: Não encontrado
components:
  schemas:
    JobStatus:
      type: object
      properties:
        id: { type: string }
        status:
          type: string
          enum: [pending, loading, geocoding, clustering, exporting, done, failed]
        progress: { type: number, minimum: 0, maximum: 1 }
        message: { type: string }
        metrics:
          type: object
          additionalProperties: true
