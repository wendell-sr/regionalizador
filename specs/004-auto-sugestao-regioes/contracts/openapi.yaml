openapi: 3.1.0
info:
  title: Regionalizador API
  version: 0.4.0
  description: |
    Mudanças desde 003: novo endpoint `POST /jobs/suggest-regions`.
servers:
  - url: http://localhost:8000
paths:
  /jobs/suggest-regions:
    post:
      summary: Sugere número ótimo de regiões (spec 004)
      description: |
        Calcula silhouette score para k ∈ [2, min(15, sqrt(N))] e retorna o melhor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [participants, city_name]
              properties:
                participants:
                  type: array
                  items:
                    type: object
                    required: [lat, lon]
                    properties:
                      lat: { type: number }
                      lon: { type: number }
                      qty: { type: integer, default: 1 }
                city_name: { type: string }
                target_crs: { type: string, default: EPSG:31983 }
      responses:
        "200":
          description: Sugestão calculada
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommended: { type: integer }
                  scores:
                    type: array
                    items:
                      type: object
                      properties:
                        k: { type: integer }
                        silhouette: { type: number, nullable: true }
                        inertia: { type: number }
        "400":
          description: Menos de 10 participantes ou município não encontrado
